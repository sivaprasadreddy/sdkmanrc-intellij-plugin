name: Release Plugin

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Get project version
        id: get_version
        run: |
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./build/distributions/sdkmanrc-intellij-plugin-${{ steps.get_version.outputs.version }}.zip

      - name: Generate SHA256 checksum
        run: |
          sha256sum build/distributions/sdkmanrc-intellij-plugin-${{ steps.get_version.outputs.version }}.zip > checksum.txt
          cat checksum.txt

      - name: Upload checksum
        uses: softprops/action-gh-release@v2
        with:
          files: ./checksum.txt
